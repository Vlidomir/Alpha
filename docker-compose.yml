services:
  postgres:
    image: postgres:16-alpine
    container_name: alpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    ports:
      - "5432:5432"
    volumes:
      - alpha-postgres-data:/var/lib/postgresql/data

volumes:
  alpha-postgres-data:
